<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review | Azcapotzalco Boxing Club</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" id="review-form">
            <label for="product-name">Product Name</label>
            <select id="product-name" name="product-name" required>
                <option value="" disabled selected>Select a Product ...</option>
                </select>

            <fieldset class="rating-box">
                <legend>Overall Rating (1-5 Stars) *</legend>
                <div class="stars">
                    <label><input type="radio" name="rating" value="1" required> 1 ☆</label>
                    <label><input type="radio" name="rating" value="2" required> 2 ☆</label>
                    <label><input type="radio" name="rating" value="3" required> 3 ☆</label>
                    <label><input type="radio" name="rating" value="4" required> 4 ☆</label>
                    <label><input type="radio" name="rating" value="5" required> 5 ☆</label>
                </div>
            </fieldset>

            <label for="install-date">Date of Installation *</label>
            <input type="date" id="install-date" name="install-date" required>

            <fieldset>
                <legend>Which features did you find useful?</legend>
                <label><input type="checkbox" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" name="features" value="design"> Design</label>
                <label><input type="checkbox" name="features" value="performance"> Performance</label>
                <label><input type="checkbox" name="features" value="comfort"> Comfort</label>
            </fieldset>

            <label for="review-text">Written Review (Optional)</label>
            <textarea id="review-text" name="review-text" rows="4"></textarea>

            <label for="user-name">Your Name (Optional)</label>
            <input type="text" id="user-name" name="user-name">

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Cesar Velasco | Mexico</p>
    </footer>
</body>
</html>
