<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Album</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">

  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/temples-large.css">
  
  <script src="scripts/temples.js" defer></script>
</head>
<body>
  <header>
    <h2>Temple Album</h2>
    <button id="hamburger">&#9776;</button>
    <nav id="navMenu">
      <a href="#">Home</a>
      <a href="#">Old</a>
      <a href="#">New</a>
      <a href="#">Large</a>
      <a href="#">Small</a>
    </nav>
  </header>

  <main>
    <h1>Temples Around the World</h1>
    <section class="grid-container">
      <figure>
        <img src="images/monterreytemple.jpg" alt="Monterrey Mexico Temple" loading="lazy">
        <figcaption>Monterrey Temple</figcaption>
      </figure>
      <figure>
        <img src="images/campinas-brazil.jpg" alt="Campinas Brazil Temple" loading="lazy">
        <figcaption>Campinas Brazil Temple</figcaption>
      </figure>
      <figure>
        <img src="images/palmyra.jpg" alt="Palmyra New York Temple" loading="lazy">
        <figcaption>Palmira New York Temple</figcaption>
      </figure>
      <figure>
        <img src="images/deseret-peak-utah.jpg" alt="Deseret Peak Utah Temple" loading="lazy">
        <figcaption>Desert Peak Utah Temple</figcaption>
      </figure>
      <figure>
        <img src="images/durban-south-africa-temple.jpg" alt="Durban South Africa Temple" loading="lazy">
        <figcaption>Durban South Africa Temple</figcaption>
      </figure>
      <figure>
        <img src="images/manila.jpg" alt="Manila Philippines Temple" loading="lazy">
        <figcaption>Manila Philippines Temple</figcaption>
      </figure>
      <figure>
        <img src="images/perth-australia-temple.jpg" alt="Perth Australia Temple" loading="lazy">
        <figcaption>Perth Australia Temple</figcaption>
      </figure>
      <figure>
        <img src="images//angeles-california-temple.jpg" alt="Los Angeles California Temple" loading="lazy">
        <figcaption>Angeles California Temple</figcaption>
      </figure>
      <figure>
        <img src="images/osaka.jpg" alt="Osaka Japan Temple" loading="lazy">
        <figcaption>Osaka Japan Temple</figcaption>
      </figure>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> | Cesar Velasco, Mexico</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
