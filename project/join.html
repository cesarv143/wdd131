<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Azcapotzalco Boxing Club</title>
    <link rel="stylesheet" href="styles/siteplan.css">
    <script src="scripts/main.js" defer></script>
</head>
<body>
    <header>
        <h1>Azcapotzalco Boxing Club</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="training.html">Training</a></li>
                <li><a href="join.html" class="active">Join Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Athlete Registration</h2>
            <form id="registration-form" method="get" action="index.html">
                <label for="fname">First Name *</label>
                <input type="text" id="fname" name="fname" required>

                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.com">

                <fieldset>
                    <legend>Training Level *</legend>
                    <label><input type="radio" name="level" value="beginner" required> Beginner</label>
                    <label><input type="radio" name="level" value="intermediate"> Intermediate</label>
                    <label><input type="radio" name="level" value="advanced"> Advanced</label>
                </fieldset>

                <label for="comments">Goals/Questions</label>
                <textarea id="comments" name="comments" rows="4"></textarea>

                <button type="submit" class="btn-primary">Register Now</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="currentYear"></span> | Cesar Velasco | Mexico</p>
    </footer>
</body>
</html>
